<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex" />
  <title>Inhalte verwalten</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="/admin/admin.css" />
</head>
<body>
  <div class="wrap">
    <header class="bar">
      <div class="brand">
        <span class="brand-name" id="brand-name">Website</span>
        <span class="brand-sub">Inhalte verwalten</span>
      </div>
      <div class="bar-actions">
        <a id="view-site" class="ghost view-site" href="/" target="_blank" rel="noopener" hidden>
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M14 4h6v6" />
            <path d="M20 4 11 13" />
            <path d="M19 14v5a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1V6a1 1 0 0 1 1-1h5" />
          </svg>
          Website ansehen
        </a>
        <button id="logout" class="ghost" hidden>Abmelden</button>
      </div>
    </header>

    <!-- LOGIN -->
    <section id="login" class="card" hidden>
      <h1>Anmelden</h1>
      <p class="muted">Melde dich an, um die Inhalte der Website zu bearbeiten.</p>
      <form id="login-form" novalidate>
        <label>E-Mail
          <input type="email" name="email" autocomplete="username" required />
        </label>
        <label>Passwort
          <input type="password" name="password" autocomplete="current-password" required />
        </label>
        <p id="login-error" class="error" hidden></p>
        <button type="submit" class="primary">Anmelden</button>
      </form>
    </section>

    <!-- EDITOR -->
    <section id="editor" hidden>
      <div id="fields"></div>
      <div class="actions">
        <button id="save" class="primary">Speichern</button>
        <span id="status" class="status" aria-live="polite"></span>
      </div>
      <p class="muted small">Nach dem Speichern wird die Website automatisch neu veröffentlicht (kann ein bis zwei Minuten dauern).</p>
      <div class="editor-footer">
        <a class="ghost view-site" href="/" target="_blank" rel="noopener">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M14 4h6v6" />
            <path d="M20 4 11 13" />
            <path d="M19 14v5a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1V6a1 1 0 0 1 1-1h5" />
          </svg>
          Website ansehen
        </a>
      </div>
    </section>

    <div id="boot" class="muted">Lädt …</div>
  </div>

  <button id="to-top" class="to-top" type="button" aria-label="Nach oben" title="Nach oben" hidden>
    <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <path d="M12 19V5" />
      <path d="m5 12 7-7 7 7" />
    </svg>
  </button>

  <script src="/admin/admin.js" defer></script>
</body>
</html>
